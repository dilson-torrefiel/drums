<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Kit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="zion-container">
        <img
          src="./images/zion-on-the-guitar.png"
          alt="zion-on-the-guitar"
          class="zion-image"
        />
      </div>
      <h1 class="title display-6 text-center">Zion's Drums</h1>
      <div class="drumset">
        <div class="drum left">
          <div class="hihat-left">
            <div class="cymbal">
              <kbd class="key">S</kbd>
              <img
                src="./images/cymbals.png"
                alt="cymbal"
                class="cymbal cymbal-image"
              />
              <audio id="cymbal-sound" src="./sounds/crash.mp3"></audio>
            </div>
          </div>
          <div class="snare">
            <img
              src="./images/snare.png"
              alt="snare"
              class="snare-image mt-3"
            />
            <kbd class="key key-A" tabindex="0">A</kbd>
            <audio id="snare-sound" src="./sounds/snare.mp3"></audio>
          </div>
        </div>
        <div class="drum middle">
          <div class="tom3-tom4">
            <div class="tom3">
              <img src="./images/tom3.png" alt="Tom" class="tom3-image" />
              <kbd class="key">J</kbd>
              <audio id="tom3-sound" src="./sounds/tom-3.mp3"></audio>
            </div>

            <div class="tom4">
              <img src="./images/tom4.png" alt="Tom" class="tom4-image" />
              <kbd class="key">K</kbd>
              <audio id="tom4-sound" src="./sounds/tom-4.mp3"></audio>
            </div>
          </div>
          <div class="kicks">
            <img src="./images/kicks.png" alt="Kick" class="kick-image" />
            <kbd class="key">D</kbd>
            <audio id="kick-sound" src="./sounds/kick-bass.mp3"></audio>
          </div>
        </div>
        <div class="drum right">
          <div class="tom1">
            <kbd class="key">L</kbd>
            <img src="./images/tom1.png" alt="Tom" class="tom1-image" />
            <audio id="tom1-sound" src="./sounds/tom-1.mp3"></audio>
          </div>
          <div class="tom2">
            <img src="./images/tom2.png" alt="Tom" class="tom2-image" />
            <kbd class="key">;</kbd>
            <audio id="tom2-sound" src="./sounds/tom-2.mp3"></audio>
          </div>
        </div>
      </div>
      <p class="small text-center">Tap to play!</p>
    </div>
  </body>
  <footer>
    <div class="footer mt-3">
      <h1 class="footer-logo">
        🕷️s<img
          src="./images/code.png"
          class="code-image"
          height="25"
          alt="code image"
        />n
      </h1>
      <p id="footer" class="margin-o padding-0" title="by: dtorrefiel">
        ®️2026 Software Engineering.
      </p>
      <p class="margin-o padding-0">
        HTML5 | CSS3 | Bootstrap | JavaScript | jQuery
      </p>
    </div>
  </footer>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    defer
  ></script>
  <script src="./drum-kit.js" defer></script>
</html>
